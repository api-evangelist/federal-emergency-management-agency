aid: federal-emergency-management-agency
name: Federal Emergency Management Agency
description: The Federal Emergency Management Agency (FEMA) coordinates the federal government's role in preparing for, preventing,
  mitigating, responding to, and recovering from disasters. The OpenFEMA program provides programmatic access to disaster
  declarations, public assistance, individual assistance, hazard mitigation, and National Flood Insurance Program (NFIP) data.

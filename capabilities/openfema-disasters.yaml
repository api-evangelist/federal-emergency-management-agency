naftiko: 1.0.0-alpha2
info:
  label: OpenFEMA API — Disasters
  description: 'OpenFEMA API — Disasters. 3 operations. Lead operation: List declaration denials. Self-contained Naftiko capability
    covering one Federal Emergency Management Agency business surface.'
  tags:
  - Federal Emergency Management Agency
  - Disasters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FEDERAL_EMERGENCY_MANAGEMENT_AGENCY_API_KEY: FEDERAL_EMERGENCY_MANAGEMENT_AGENCY_API_KEY
capability:
  consumes:
  - type: http
    namespace: openfema-disasters
    baseUri: https://www.fema.gov/api/open
    description: OpenFEMA API — Disasters business capability. Self-contained, no shared references.
    resources:
    - name: v1-DeclarationDenials
      path: /v1/DeclarationDenials
      operations:
      - name: listdeclarationdenials
        method: GET
        description: List declaration denials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-FemaWebDisasterDeclarations
      path: /v1/FemaWebDisasterDeclarations
      operations:
      - name: listfemawebdisasterdeclarations
        method: GET
        description: List FEMA web disaster declarations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-DisasterDeclarationsSummaries
      path: /v2/DisasterDeclarationsSummaries
      operations:
      - name: listdisasterdeclarationssummaries
        method: GET
        description: List disaster declarations summaries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: openfema-disasters-rest
    port: 8080
    description: REST adapter for OpenFEMA API — Disasters. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/declarationdenials
      name: v1-declarationdenials
      description: REST surface for v1-DeclarationDenials.
      operations:
      - method: GET
        name: listdeclarationdenials
        description: List declaration denials
        call: openfema-disasters.listdeclarationdenials
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/femawebdisasterdeclarations
      name: v1-femawebdisasterdeclarations
      description: REST surface for v1-FemaWebDisasterDeclarations.
      operations:
      - method: GET
        name: listfemawebdisasterdeclarations
        description: List FEMA web disaster declarations
        call: openfema-disasters.listfemawebdisasterdeclarations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/disasterdeclarationssummaries
      name: v2-disasterdeclarationssummaries
      description: REST surface for v2-DisasterDeclarationsSummaries.
      operations:
      - method: GET
        name: listdisasterdeclarationssummaries
        description: List disaster declarations summaries
        call: openfema-disasters.listdisasterdeclarationssummaries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openfema-disasters-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenFEMA API — Disasters. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-declaration-denials
      description: List declaration denials
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-disasters.listdeclarationdenials
      outputParameters:
      - type: object
        mapping: $.
    - name: list-fema-web-disaster-declarations
      description: List FEMA web disaster declarations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-disasters.listfemawebdisasterdeclarations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-disaster-declarations-summaries
      description: List disaster declarations summaries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-disasters.listdisasterdeclarationssummaries
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: OpenFEMA API — Metadata
  description: 'OpenFEMA API — Metadata. 2 operations. Lead operation: List OpenFEMA datasets. Self-contained Naftiko capability
    covering one Federal Emergency Management Agency business surface.'
  tags:
  - Federal Emergency Management Agency
  - Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FEDERAL_EMERGENCY_MANAGEMENT_AGENCY_API_KEY: FEDERAL_EMERGENCY_MANAGEMENT_AGENCY_API_KEY
capability:
  consumes:
  - type: http
    namespace: openfema-metadata
    baseUri: https://www.fema.gov/api/open
    description: OpenFEMA API — Metadata business capability. Self-contained, no shared references.
    resources:
    - name: v1-OpenFemaDataSets
      path: /v1/OpenFemaDataSets
      operations:
      - name: listopenfemadatasets
        method: GET
        description: List OpenFEMA datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-FemaRegions
      path: /v2/FemaRegions
      operations:
      - name: listfemaregions
        method: GET
        description: List FEMA regions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: openfema-metadata-rest
    port: 8080
    description: REST adapter for OpenFEMA API — Metadata. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/openfemadatasets
      name: v1-openfemadatasets
      description: REST surface for v1-OpenFemaDataSets.
      operations:
      - method: GET
        name: listopenfemadatasets
        description: List OpenFEMA datasets
        call: openfema-metadata.listopenfemadatasets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/femaregions
      name: v2-femaregions
      description: REST surface for v2-FemaRegions.
      operations:
      - method: GET
        name: listfemaregions
        description: List FEMA regions
        call: openfema-metadata.listfemaregions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openfema-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenFEMA API — Metadata. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-openfema-datasets
      description: List OpenFEMA datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-metadata.listopenfemadatasets
      outputParameters:
      - type: object
        mapping: $.
    - name: list-fema-regions
      description: List FEMA regions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfema-metadata.listfemaregions
      outputParameters:
      - type: object
        mapping: $.

      path: /v2/DisasterDeclarationsSummaries
      operations:
      - name: listdisasterdeclarationssummaries
        method: GET
        description: List disaster declarations summaries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
